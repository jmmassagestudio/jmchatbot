<style>
:root{--green-dark:#1a3a2a;--green-mid:#2d5a3d;--green-light:#4a7c59;--gold-light:#e8c97a;--cream:#faf7f0;--cream-dark:#f0ebe0;--text-dark:#1a1a1a;--text-light:#7a7a7a;--white:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--green-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(74,124,89,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.08) 0%,transparent 50%);}
.chat-container{width:100%;max-width:420px;height:90vh;max-height:780px;background:var(--cream);border-radius:24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.2);}
.chat-header{background:var(--green-dark);padding:20px 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(201,168,76,.3);}
.avatar{width:52px;height:52px;border-radius:50%;border:2px solid rgba(201,168,76,.5);overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.header-info h1{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:600;color:var(--white);letter-spacing:.3px;}
.header-info p{font-size:12px;color:var(--gold-light);font-weight:300;margin-top:2px;}
.status-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.lang-badge{font-size:11px;color:rgba(232,201,122,.7);margin-top:3px;letter-spacing:.3px;}
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:2px}
.message{display:flex;flex-direction:column;animation:fadeUp .3s ease forwards;opacity:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.bot{align-items:flex-start}.message.user{align-items:flex-end}
.bubble{max-width:82%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.7;}
.bot .bubble{background:var(--white);color:var(--text-dark);border-radius:4px 18px 18px 18px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid rgba(0,0,0,.05);white-space:pre-wrap;}
.user .bubble{background:var(--green-dark);color:var(--white);border-radius:18px 18px 4px 18px;}
.date-divider{text-align:center;font-size:11px;color:var(--text-light);font-weight:300;letter-spacing:.5px;margin:4px 0;}
.typing{display:flex;align-items:center;gap:4px;padding:12px 16px;background:var(--white);border-radius:4px 18px 18px 18px;width:fit-content;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.typing span{width:7px;height:7px;background:var(--green-light);border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.qr-btn{background:var(--white);border:1.5px solid var(--green-mid);color:var(--green-dark);padding:8px 14px;border-radius:20px;font-size:12.5px;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .2s ease;font-weight:500;}
.qr-btn:hover{background:var(--green-dark);color:var(--white);border-color:var(--green-dark);transform:translateY(-1px);}
.input-area{padding:14px 16px 20px;background:var(--white);border-top:1px solid var(--cream-dark);display:flex;gap:10px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--cream);border-radius:22px;border:1.5px solid var(--cream-dark);padding:10px 16px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--green-mid)}
#userInput{width:100%;border:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--text-dark);resize:none;outline:none;max-height:80px;line-height:1.5;}
#userInput::placeholder{color:var(--text-light)}
.send-btn{width:44px;height:44px;background:var(--green-dark);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease;}
.send-btn:hover{background:var(--green-mid);transform:scale(1.05)}.send-btn:active{transform:scale(.95)}
.send-btn svg{width:18px;height:18px;fill:var(--white)}
.contact-card{background:linear-gradient(135deg,var(--green-dark),var(--green-mid));border-radius:10px;padding:12px 14px;color:var(--white);font-size:13px;line-height:1.8;margin-top:4px;}
.contact-card a{color:var(--gold-light);text-decoration:none;}
</style>
</head>

function matchQuery(input) {
  const t = input.trim();
  if (t.length < 2) return null;
  for (const item of KB) {
    for (const p of item.patterns) {
      if (p.test(t)) return item;
    }
  }
  return null;
}

function addMessage(text, sender, isHTML) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message " + sender;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (isHTML) bubble.innerHTML = text;
  else bubble.textContent = text;
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message bot";
  div.id = "typing-indicator";
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function addQuickReplies(replies) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "quick-replies";
  div.id = "quick-reply-btns";
  replies.forEach(function(r) {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = r;
    btn.onclick = function() { removeQuickReplies(); handleUserMessage(r); };
    div.appendChild(btn);
  });
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeQuickReplies() {
  const el = document.getElementById("quick-reply-btns");
  if (el) el.remove();
}

function handleUserMessage(text) {
  removeQuickReplies();
  addMessage(text, "user", false);
  showTyping();
  setTimeout(function() {
    hideTyping();
    if (isNonEnglish(text)) {
      addMessage("This assistant supports English only. \uD83D\uDE4F\n\nFor assistance in other languages, please contact our team directly during opening hours (10AM\u201310PM):", "bot", false);
      setTimeout(function() { addMessage(CONTACT_HTML, "bot", true); }, 300);
      return;
    }
    const match = matchQuery(text);
    if (match) {
      addMessage(match.answer, "bot", false);
    } else {
      addMessage("Thank you for your message! \uD83D\uDE4F\n\nI'm sorry, I don't have specific information about that. Please contact our team directly during opening hours (10AM\u201310PM) and we'll be happy to help:", "bot", false);
      setTimeout(function() { addMessage(CONTACT_HTML, "bot", true); }, 300);
    }
  }, 700);
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  handleUserMessage(text);
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

    addMessage("Sawasdee krab! \uD83D\uDE4F Welcome to JM Massage Studio.\n\nI'm your virtual assistant. How can I help you today?", "bot", false);

        "\uD83D\uDCDE Contact Us"
      ]);
    }, 400);
  }, 800);
}
